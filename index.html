<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>上學小幫手</title>
    <style>
        :root { --bg-color: #f0fcfd; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Arial', sans-serif; background-color: var(--bg-color); position: fixed; touch-action: none; }
        
        #orientation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #333; color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        @media screen and (orientation: portrait) { #orientation-overlay { display: flex; } }

        #game-container { display: none; width: 100vw; height: 100dvh; position: relative; }
        
        /* Layout */
        #school-bag-container { position: absolute; left: 5%; top: 15%; width: 35%; height: 75%; display: flex; align-items: center; justify-content: center; }
        #school-bag-img { width: 100%; height: 100%; object-fit: contain; }

        #items-grid { position: absolute; right: 5%; top: 15%; width: 50%; height: 75%; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); gap: 15px; }
        
        .item-slot { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.3); border-radius: 15px; }

        .item { width: 100px; height: 120px; cursor: grab; touch-action: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; position: relative; background: white; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .item img { width: 70px; height: 70px; object-fit: contain; pointer-events: none; }
        .item span { font-size: 14px; font-weight: bold; margin-top: 5px; pointer-events: none; }

        .dragging { opacity: 0.9; transform: scale(1.1); z-index: 1000 !important; position: fixed !important; }
        .returning { transition: all 0.3s ease-out; }

        /* UI */
        #welcome-page, #congrats-page { position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg-color); z-index: 1500; }
        .btn-start { padding: 20px 60px; font-size: 28px; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 50px; box-shadow: 0 5px 0 #2e7d32; }
