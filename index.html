<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>上學小幫手</title>
    <style>
        :root { --bg: #f0fcfd; --primary: #4caf50; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: sans-serif; }

        /* Orientation Logic */
        #rotate-notice { position: fixed; inset: 0; background: #333; color: #fff; display: none; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        @media (orientation: portrait) { #rotate-notice { display: flex; } }

        /* Pages */
        .page { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: var(--bg); }
        #game-screen { display: none; z-index: 5; }

        /* UI */
        #status-bar { position: absolute; top: 20px; font-size: 24px; font-weight: bold; color: #00796b; }
        
        /* Layout */
        #drop-zone-container { position: absolute; left: 5%; top: 20%; width: 40%; height: 70%; display: flex; align-items: center; justify-content: center; }
        #bag-graphic { width: 100%; height: 100%; object-fit: contain; border: 3px dashed rgba(0,0,0,0.1); border-radius: 20px; }

        #items-container { position: absolute; right: 5%; top: 20%; width: 50%; height: 70%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .slot { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

        /* Draggable Item */
        .piece { 
            width: 100px; height: 130px; background: #fff; border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100;
        }
        .piece img { width: 70px; height: 70px; object-fit: contain; pointer-events: none; }
        .piece span { font-size: 14px; font-weight: bold; margin-top: 8px; pointer-events: none; }

        .is-dragging { position: fixed !important; z-index: 999 !important; opacity: 0.9; transform: scale(1.1); pointer-events: none; box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .is-returning { transition: all 0.3s ease-out; }

        .btn { padding: 20px 60px; font-size: 28px; background: var(--primary); color: #fff; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #2e7d32; }
    </style>
</head>
<body>

    <div id="rotate-notice"><h2>🔄 請旋轉橫螢幕遊玩</h2></div>

    <div id="start-screen" class="page">
        <h1>🎒 上學小幫手</h1>
        <button class="btn" onclick="startGame()">開始遊戲</button>
    </div>

    <div id="game-screen" class="page">
        <div id="status-bar">進度: <span id="count">1</span> / 10</div>
        
        <div id="drop-zone-container">
            <img id="bag-graphic" src="assets/images/school_bag.png">
        </div>

        <div id="items-container"></div>
    </div>

    <div id="win-screen" class="page" style="display:none;">
        <h1>🎉 你好叻呀！</h1>
        <button class="btn" onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        const config = [
            { id: 'bag', text: '功課袋', img: 'homework_bag.jpg' },
            { id: 'pens', text: '顏色筆', img: 'colored_pencils.png' },
            { id: 'scissors', text: '較剪', img: 'scissors.png' },
            { id: 'handbook', text: '手冊', img: 'handbook.jpg' },
            { id: 'eraser', text: '擦膠', img: 'eraser.png' },
            { id: 'pencil', text: '鉛筆', img: 'pencil.png' }
        ];

        let score = 0;
        let targetId = '';
        let locked = false;

        function play(file) {
            const a = new Audio(`assets/audio/${file}`);
            a.play().catch(() => {});
        }

        function startGame() {
            // Audio Unlock
            play('correct.mp3');
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            
            const container = document.getElementById('items-container');
            config.forEach(item => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.id = item.id;
                piece.innerHTML = `<img src="assets/images/${item.img}"><span>${item.text}</span>`;
                
                bindEvents(piece, slot);
                slot.appendChild(piece);
                container.appendChild(slot);
            });
            
            nextQuestion();
        }

        function nextQuestion() {
            if (score >= 10) {
                document.getElementById('game-screen').style.display = 'none';
                document.getElementById('win-screen').style.display = 'flex';
                play('congrats_fanfare.mp3');
                return;
            }
            
            locked = false;
            const pick = config[Math.floor(Math.random() * config.length)];
            targetId = pick.id;
            document.getElementById('count').innerText = score + 1;
            play(`voice_${targetId}.mp3`);
        }

        function bindEvents(el, slot) {
            let ox, oy;

            const start = (e) => {
                if (locked) return;
                const t = e.touches[0];
                const r = el.getBoundingClientRect();
                ox = t.clientX - r.left;
                oy = t.clientY - r.top;
                
                el.style.width = r.width + 'px';
                el.style.height = r.height + 'px';
                el.style.left = r.left + 'px';
                el.style.top = r.top + 'px';
                el.classList.add('is-dragging');
            };

            const move = (e) => {
                if (!el.classList.contains('is-dragging')) return;
                const t = e.touches[0];
                el.style.left = (t.clientX - ox) + 'px';
                el.style.top = (t.clientY - oy) + 'px';
            };

            const end = (e) => {
                if (!el.classList.contains('is-dragging')) return;
                el.classList.remove('is-dragging');

                const bag = document.getElementById('bag-graphic').getBoundingClientRect();
                const r = el.getBoundingClientRect();
                
                // Calculate center point of the piece
                const cx = r.left + (r.width / 2);
                const cy = r.top + (r.height / 2);

                // Check if center point is inside bag bounds
                const hit = (cx > bag.left && cx < bag.right && cy > bag.top && cy < bag.bottom);

                if (hit && el.id === targetId) {
                    locked = true;
                    score++;
                    play('correct.mp3');
                    returnToSlot(el, slot);
                    setTimeout(nextQuestion, 1500);
                } else {
                    if (hit) play('incorrect.mp3');
                    returnToSlot(el, slot);
                }
            };

            el.addEventListener('touchstart', start);
            window.addEventListener('touchmove', move, { passive: false });
            window.addEventListener('touchend', end);
        }

        function returnToSlot(el, slot) {
            el.classList.add('is-returning');
            const r = slot.getBoundingClientRect();
            el.style.left = r.left + 'px';
            el.style.top = r.top + 'px';

            setTimeout(() => {
                el.classList.remove('is-returning');
                el.style.position = 'relative';
                el.style.left = '0';
                el.style.top = '0';
                slot.appendChild(el);
            }, 300);
        }
    </script>
</body>
</html>
