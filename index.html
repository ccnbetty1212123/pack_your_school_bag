<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>上學小幫手</title>
    <style>
        :root { --bg-color: #f0fcfd; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Arial', sans-serif; background-color: var(--bg-color); position: fixed; touch-action: none; }
        
        #orientation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #333; color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; }
        @media screen and (orientation: portrait) { #orientation-overlay { display: flex; } }

        #game-container { display: none; width: 100vw; height: 100dvh; position: relative; }
        
        #school-bag-container { position: absolute; left: 5%; top: 15%; width: 35%; height: 75%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        #school-bag-img { width: 100%; height: 100%; object-fit: contain; }

        #items-grid { position: absolute; right: 5%; top: 15%; width: 50%; height: 75%; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); gap: 15px; }
        .item-slot { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.03); border-radius: 15px; }

        .item { width: 100px; height: 120px; cursor: grab; touch-action: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .item img { width: 70px; height: 70px; object-fit: contain; pointer-events: none; }
        .item span { font-size: 14px; font-weight: bold; margin-top: 5px; pointer-events: none; }

        .dragging { opacity: 0.8; transform: scale(1.1); z-index: 1000 !important; position: fixed !important; pointer-events: none; }
        .returning { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #welcome-page, #congrats-page { position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg-color); z-index: 1500; }
        .btn-start { padding: 25px 80px; font-size: 32px; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 60px; font-weight: bold; box-shadow: 0 5px 0 #2e7d32; }
        .btn-start:active { transform: translateY(3px); box-shadow: none; }
        #ui-bar { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="orientation-overlay"><h2>🔄 請轉橫螢幕遊玩<br>Please Rotate to Landscape</h2></div>

    <div id="welcome-page">
        <h1>🎒 上學小幫手</h1>
        <p>聽指令，收拾書包！</p>
        <button class="btn-start" onclick="initGame()">開始遊戲</button>
    </div>

    <div id="game-container">
        <div id="ui-bar">進度: <span id="trial-count">0</span> / 10</div>
        <div id="school-bag-container">
            <img id="school-bag-img" src="assets/images/school_bag.png">
        </div>
        <div id="items-grid"></div>
    </div>

    <div id="congrats-page" style="display:none;">
        <h1>🎉 你好叻呀！</h1>
        <p>順利完成 10 個挑戰！</p>
        <button class="btn-start" onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        const words = [
            { id: 'bag', text: '功課袋', file: 'homework_bag.jpg' },
            { id: 'pens', text: '顏色筆', file: 'colored_pencils.png' },
            { id: 'scissors', text: '較剪', file: 'scissors.png' },
            { id: 'handbook', text: '手冊', file: 'handbook.jpg' },
            { id: 'eraser', text: '擦膠', file: 'eraser.png' },
            { id: 'pencil', text: '鉛筆', file: 'pencil.png' }
        ];

        let trials = 0;
        let currentTarget = null;
        let lastTarget = null;
        let history = [];
        let isTrialMoving = false;

        function playSound(file) {
            const a = new Audio(`assets/audio/${file}`);
            a.play().catch(e => console.error("Audio error:", file));
        }

        function initGame() {
            // "Wake up" audio for iOS
            const unlock = new Audio('assets/audio/correct.mp3');
            unlock.volume = 0;
            unlock.play().then(() => { unlock.pause(); }).catch(()=>{});

            // Switch UI
            document.getElementById('welcome-page').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            // Build Grid
            const grid = document.getElementById('items-grid');
            grid.innerHTML = ''; // Clear any old items
            words.forEach(word => {
                const slot = document.createElement('div');
                slot.className = 'item-slot';
                const el = document.createElement('div');
                el.className = 'item';
                el.id = word.id;
                el.innerHTML = `<img src="assets/images/${word.file}"><span>${word.text}</span>`;
                setupDrag(el, slot);
                slot.appendChild(el);
                grid.appendChild(slot);
            });
            
            nextTrial();
        }

        function nextTrial() {
            if (trials >= 10) {
                document.getElementById('game-container').style.display = 'none';
                document.getElementById('congrats-page').style.display = 'flex';
                playSound('congrats_fanfare.mp3');
                return;
            }

            let available = words.filter(w => w.id !== (lastTarget ? lastTarget.id : null));
            if (trials < 6) available = available.filter(w => !history.includes(w.id));
            
            currentTarget = available[Math.floor(Math.random() * available.length)];
            lastTarget = currentTarget;
            history.push(currentTarget.id);
            
            document.getElementById('trial-count').innerText = trials + 1;
            playSound(`voice_${currentTarget.id}.mp3`);
            isTrialMoving = false; 
        }

        function setupDrag(el, slot) {
            let startX, startY;

            el.addEventListener('touchstart', (e) => {
                if (isTrialMoving) return;
                const t = e.touches[0];
                const rect = el.getBoundingClientRect();
                startX = t.clientX - rect.left;
                startY = t.clientY - rect.top;
                
                el.style.width = rect.width + 'px';
                el.style.height = rect.height + 'px';
                el.style.left = rect.left + 'px';
                el.style.top = rect.top + 'px';
                el.classList.add('dragging');
            });

            window.addEventListener('touchmove', (e) => {
                if (!el.classList.contains('dragging')) return;
                const t = e.touches[0];
                el.style.left = (t.clientX - startX) + 'px';
                el.style.top = (t.clientY - startY) + 'px';
            }, { passive: false });
