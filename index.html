<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>上學小幫手</title>
    <style>
        :root { --bg-color: #f0fcfd; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background-color: var(--bg-color); position: fixed; touch-action: none; }
        
        #orientation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #333; color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; }
        @media screen and (orientation: portrait) { #orientation-overlay { display: flex; } }

        #welcome-page, #congrats-page { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg-color); z-index: 1500; }
        #game-container { display: none; width: 100vw; height: 100dvh; position: relative; }
        
        #school-bag-container { position: absolute; left: 5%; top: 15%; width: 35%; height: 75%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        #school-bag-img { width: 100%; height: 100%; object-fit: contain; background: rgba(0,0,0,0.05); border-radius: 20px; }

        #items-grid { position: absolute; right: 5%; top: 15%; width: 50%; height: 75%; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); gap: 10px; }
        .item-slot { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border: 1px dashed #ccc; border-radius: 10px; }

        .item { width: 90px; height: 110px; cursor: grab; touch-action: none; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .item img { width: 60px; height: 60px; object-fit: contain; pointer-events: none; }
        .item span { font-size: 12px; font-weight: bold; margin-top: 5px; }

        .dragging { opacity: 0.8; transform: scale(1.1); z-index: 1000 !important; position: fixed !important; pointer-events: none; }
        .returning { transition: all 0.3s ease-out; }

        .btn-start { padding: 20px 60px; font-size: 28px; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px #2e7d32; }
        #ui-bar { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="orientation-overlay"><h2>🔄 請轉橫螢幕遊玩</h2></div>

    <div id="welcome-page">
        <h1>🎒 上學小幫手</h1>
        <button class="btn-start" onclick="initGame()">開始遊戲 (START)</button>
    </div>

    <div id="game-container">
        <div id="ui-bar">進度: <span id="trial-count">0</span> / 10</div>
        <div id="school-bag-container">
            <img id="school-bag-img" src="assets/images/school_bag.png" alt="書包">
        </div>
        <div id="items-grid"></div>
    </div>

    <div id="congrats-page" style="display:none;">
        <h1>🎉 完成挑戰！</h1>
        <button class="btn-start" onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        const words = [
            { id: 'bag', text: '功課袋', file: 'homework_bag.jpg' },
            { id: 'pens', text: '顏色筆', file: 'colored_pencils.png' },
            { id: 'scissors', text: '較剪', file: 'scissors.png' },
            { id: 'handbook', text: '手冊', file: 'handbook.jpg' },
            { id: 'eraser', text: '擦膠', file: 'eraser.png' },
            { id: 'pencil', text: '鉛筆', file: 'pencil.png' }
        ];

        let trials = 0;
        let currentTarget = null;
        let lastTarget = null;
        let history = [];
        let isTrialMoving = false;

        function playSound(file) {
            const a = new Audio(`assets/audio/${file}`);
            a.play().catch(() => console.log("Audio file missing: " + file));
        }

        function initGame() {
            console.log("Game Initializing...");
            // Hide welcome, show game
            document.getElementById('welcome-page').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            const grid = document.getElementById('items-grid');
            grid.innerHTML = ''; 
            
            words.forEach(word => {
                const slot = document.createElement('div');
                slot.className = 'item-slot';
                const el = document.createElement('div');
                el.className = 'item';
                el.id = word.id;
                el.innerHTML = `<img src="assets/images/${word.file}" onerror="this.src='https://via.placeholder.com/60?text=Error'"><span>${word.text}</span>`;
                setupDrag(el, slot);
                slot.appendChild(el);
                grid.appendChild(slot);
            });
            
            nextTrial();
        }

        function nextTrial() {
            if (trials >= 10) {
                document.getElementById('game-container').style.display = 'none';
                document.getElementById('congrats-page').style.display = 'flex';
                playSound('congrats_fanfare.mp3');
                return;
            }

            let available = words.filter(w => w.id !== (lastTarget ? lastTarget.id : null));
            if (trials < 6) available = available.filter(w => !history.includes(w.id));
            
            currentTarget = available[Math.floor(Math.random() * available.length)];
            lastTarget = currentTarget;
            history.push(currentTarget.id);
            
            document.getElementById('trial-count').innerText = trials + 1;
            playSound(`voice_${currentTarget.id}.mp3`);
            isTrialMoving = false; 
        }

        function setupDrag(el, slot) {
            let startX, startY;

            el.addEventListener('touchstart', (e) => {
                if (isTrialMoving) return;
                const t = e.touches[0];
                const rect = el.getBoundingClientRect();
                startX = t.clientX - rect.left;
                startY = t.clientY - rect.top;
                
                el.style.width = rect.width + 'px';
                el.style.height = rect.height + 'px';
                el.style.left = rect.left + 'px';
                el.style.top = rect.top + 'px';
                el.classList.add('dragging');
            });

            window.addEventListener('touchmove', (e) => {
                if (!el.classList.contains('dragging')) return;
                const t = e.touches[0];
                el.style.left = (t.clientX - startX) + 'px';
                el.style.top = (t.clientY - startY) + 'px';
            }, { passive: false });

            window.addEventListener('touchend', () => {
                if (!el.classList.contains('dragging')) return;
                el.classList.remove('dragging');
                
                const bag = document.getElementById('school-bag-img').getBoundingClientRect();
                const item = el.getBoundingClientRect();

                const isOver = !(item.right < bag.left || item.left > bag.right || 
                                 item.bottom < bag.top || item.top > bag.bottom);

                if (isOver && el.id === currentTarget.id) {
                    isTrialMoving = true; 
                    playSound('correct.mp3');
                    trials++;
                    resetItem(el, slot);
                    setTimeout(nextTrial, 1200); 
                } else {
                    if (isOver) playSound('incorrect.mp3');
                    resetItem(el, slot);
                }
            });
        }

        function resetItem(el, slot) {
            el.classList.add('returning');
            const slotRect = slot.getBoundingClientRect();
            el.style.left = slotRect.left + 'px';
            el.style.top = slotRect.top + 'px';

            setTimeout(() => {
                el.classList.remove('returning');
                el.style.position = 'relative';
                el.style.left = '0';
                el.style.top = '0';
                slot.appendChild(el);
            }, 350);
        }
    </script>
</body>
</html>
