<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上學小幫手</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f0fcfd; font-family: sans-serif; touch-action: none; position: fixed; }
        #start-screen, #win-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f0fcfd; z-index: 1000; }
        #game-screen { display: none; width: 100vw; height: 100vh; position: relative; }
        
        #bag-container { position: absolute; left: 5%; top: 20%; width: 35%; height: 60%; display: flex; align-items: center; justify-content: center; border-radius: 20px; transition: background 0.2s; }
        .highlight { background: rgba(76, 175, 80, 0.2); border: 4px dashed #4caf50; }
        #bag-img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }

        #grid { position: absolute; right: 5%; top: 20%; width: 50%; height: 60%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .slot { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border: 1px solid #ddd; border-radius: 10px; }

        .item { width: 100px; height: 130px; background: white; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .item img { width: 70px; height: 70px; pointer-events: none; }
        .item span { font-size: 14px; font-weight: bold; pointer-events: none; }

        .dragging { position: fixed !important; z-index: 9999 !important; pointer-events: none; transform: scale(1.1); opacity: 0.9; }
        .returning { transition: all 0.3s ease; }

        .btn { padding: 20px 50px; font-size: 24px; background: #4caf50; color: white; border: none; border-radius: 30px; cursor: pointer; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>🎒 上學小幫手</h1>
    <button class="btn" onclick="start()">開始遊戲</button>
</div>

<div id="game-screen">
    <div id="ui">進度: <span id="count">1</span> / 10</div>
    <div id="bag-container"><img id="bag-img" src="assets/images/school_bag.png"></div>
    <div id="grid"></div>
</div>

<div id="win-screen" style="display:none;">
    <h1>🎉 你好叻呀！</h1>
    <button class="btn" onclick="location.reload()">再玩一次</button>
</div>

<script>
    const data = [
        { id: 'bag', name: '功課袋', img: 'homework_bag.jpg' },
        { id: 'pens', name: '顏色筆', img: 'colored_pencils.png' },
        { id: 'scissors', name: '較剪', img: 'scissors.png' },
        { id: 'handbook', name: '手冊', img: 'handbook.jpg' },
        { id: 'eraser', name: '擦膠', img: 'eraser.png' },
        { id: 'pencil', name: '鉛筆', img: 'pencil.png' }
    ];

    let score = 0;
    let target = '';
    let isLocked = false;

    function snd(f) { new Audio(`assets/audio/${f}`).play().catch(() => {}); }

    function start() {
        snd('correct.mp3'); // Audio unlock
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        const g = document.getElementById('grid');
        data.forEach(d => {
            const s = document.createElement('div');
            s.className = 'slot';
            const i = document.createElement('div');
            i.className = 'item';
            i.id = d.id;
            i.innerHTML = `<img src="assets/images/${d.img}"><span>${d.name}</span>`;
            
            i.ontouchstart = (e) => handleStart(e, i, s);
            s.appendChild(i);
            g.appendChild(s);
        });
        next();
    }

    function next() {
        if (score >= 10) {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('win-screen').style.display = 'flex';
            snd('congrats_fanfare.mp3');
            return;
        }
        isLocked = false;
        target = data[Math.floor(Math.random() * data.length)].id;
        document.getElementById('count').innerText = score + 1;
        snd(`voice_${target}.mp3`);
    }

    function handleStart(e, el, slot) {
        if (isLocked) return;
        const touch = e.touches[0];
        const rect = el.getBoundingClientRect();
        const offsetX = touch.clientX - rect.left;
        const offsetY = touch.clientY - rect.top;
        const bag = document.getElementById('bag-container');

        el.classList.add('dragging');
        el.style.width = rect.width + 'px';
        el.style.height = rect.height + 'px';

        const move = (me) => {
            const mt = me.touches[0];
            el.style.left = (mt.clientX - offsetX) + 'px';
            el.style.top = (mt.clientY - offsetY) + 'px';

            // Visual feedback: Highlight bag if hovering
            const bRect = bag.getBoundingClientRect();
            if (mt.clientX > bRect.left && mt.clientX < bRect.right && mt.clientY > bRect.top && mt.clientY < bRect.bottom) {
                bag.classList.add('highlight');
            } else {
                bag.classList.remove('highlight');
            }
        };

        const end = (ee) => {
            el.classList.remove('dragging');
            bag.classList.remove('highlight');
            const et = ee.changedTouches[0];
            const bRect = bag.getBoundingClientRect();

            // Logic check
            const isOver = (et.clientX > bRect.left && et.clientX < bRect.right && et.clientY > bRect.top && et.clientY < bRect.bottom);

            if (isOver && el.id === target) {
                isLocked = true;
                score++;
                snd('correct.mp3');
                reset(el, slot);
                setTimeout(next, 1200);
            } else {
                if (isOver) snd('incorrect.mp3');
                reset(el, slot);
            }
            window.removeEventListener('touchmove', move);
            window.removeEventListener('touchend', end);
        };

        window.addEventListener('touchmove', move, { passive: false });
        window.addEventListener('touchend', end);
    }

    function reset(el, slot) {
        el.classList.add('returning');
        const sRect = slot.getBoundingClientRect();
        el.style.left = sRect.left + 'px';
        el.style.top = sRect.top + 'px';
        setTimeout(() => {
            el.classList.remove('returning');
            el.style.position = 'relative';
            el.style.left = '0';
            el.style.top = '0';
            slot.appendChild(el);
        }, 300);
    }
</script>
</body>
</html>
