<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>上學小幫手</title>
    <style>
        :root { --bg-color: #e0f7fa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            position: fixed; touch-action: none;
        }

        /* Orientation Logic */
        #orientation-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #333; color: white; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; text-align: center; display: none;
        }
        @media screen and (orientation: portrait) { #orientation-overlay { display: flex; } }

        /* Game Container */
        #game-container {
            display: none; width: 100vw; height: 100dvh; position: relative;
        }

        /* LEFT SIDE: School Bag */
        #school-bag-container {
            position: absolute; left: 2%; top: 15%;
            width: 40%; height: 75%;
            display: flex; align-items: center; justify-content: center;
        }
        #school-bag-img { width: 100%; height: 100%; object-fit: contain; }

        /* RIGHT SIDE: Nice Grid for Items */
        #items-grid {
            position: absolute; right: 2%; top: 15%;
            width: 54%; height: 75%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
        }

        .item-slot {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .item {
            width: 90%; height: 90%;
            cursor: grab; touch-action: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; background: white; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .item img { width: 70%; height: 70%; object-fit: contain; pointer-events: none; }
        .item span { font-size: 1.5vw; font-weight: bold; margin-top: 5px; }

        .item.dragging { opacity: 0.8; transform: scale(1.1); z-index: 1000; position: fixed; width: 120px; height: 120px; }
        .item.returning { transition: all 0.4s ease-out; }

        /* Pages */
        #welcome-page, #congrats-page {
            position: fixed; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg-color); z-index: 1500;
        }

        .btn-start {
            padding: 20px 60px; font-size: 30px; cursor: pointer;
            background: #4caf50; color: white; border: none; border-radius: 50px;
            box-shadow: 0 6px 0 #2e7d32;
        }

        #ui-bar { position: absolute; top: 2%; width: 100%; text-align: center; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="orientation-overlay"><h2>🔄 請轉橫螢幕遊玩<br>Please Rotate to Landscape</h2></div>

    <div id="welcome-page">
        <h1>🎒 上學小幫手</h1>
        <button class="btn-start" onclick="unlockAudioAndStart()">開始遊戲</button>
    </div>

    <div id="game-container">
        <div id="ui-bar">進度: <span id="trial-count">0</span> / 10</div>
        <div id="school-bag-container">
            <img id="school-bag-img" src="assets/images/school_bag.png">
        </div>
        <div id="items-grid" id="items-area"></div>
    </div>

    <div id="congrats-page" style="display:none;">
        <h1>🎉 你真棒！你好叻呀！</h1>
        <button class="btn-start" onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        const words = [
            { id: 'bag', text: '功課袋', file: 'homework_bag.jpg' },
            { id: 'pens', text: '顏色筆', file: 'colored_pencils.png' },
            { id: 'scissors', text: '較剪', file: 'scissors.png' },
            { id: 'handbook', text: '手冊', file: 'handbook.jpg' },
            { id: 'eraser', text: '擦膠', file: 'eraser.png' },
            { id: 'pencil', text: '鉛筆', file: 'pencil.png' }
        ];

        let trials = 0;
        let currentTarget = null;
        let lastTarget = null;
        let history = [];
        let audioContext;

        // CRITICAL: iOS Audio Unlock
        function unlockAudioAndStart() {
            // Create a dummy silent buffer to wake up the audio engine
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContext();
            
            // Start the game
            document.getElementById('welcome-page').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            initItems();
            setTimeout(nextTrial, 800);
        }

        function playSound(file) {
            const a = new Audio(`assets/audio/${file}`);
            a.play().catch(e => console.error("Playback failed", e));
        }

        function initItems() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = '';
            words.forEach((item) => {
                const slot = document.createElement('div');
                slot.className = 'item-slot';
                
                const div = document.createElement('div');
                div.className = 'item';
                div.id = item.id;
                div.innerHTML = `<img src="assets/images/${item.file}"><span>${item.text}</span>`;
                
                setupDraggable(div, slot);
                slot.appendChild(div);
                grid.appendChild(slot);
            });
        }

        function nextTrial() {
            if (trials >= 10) {
                document.getElementById('game-container').style.display = 'none';
                document.getElementById('congrats-page').style.display = 'flex';
                playSound('congrats_fanfare.mp3');
                return;
            }
            let available = words.filter(w => w.id !== (lastTarget ? lastTarget.id : null));
            if (trials < 6) available = available.filter(w => !history.includes(w.id));
            currentTarget = available[Math.floor(Math.random() * available.length)];
            lastTarget = currentTarget;
            history.push(currentTarget.id);
            playSound(`voice_${currentTarget.id}.mp3`);
            document.getElementById('trial-count').innerText = trials + 1;
        }

        function setupDraggable(el, slot) {
            let startX, startY, initL, initT;
            
            el.addEventListener('touchstart', (e) => {
                const t = e.touches[0];
                const rect = el.getBoundingClientRect();
                initL = rect.left;
                initT = rect.top;
                startX = t.clientX;
                startY = t.clientY;
                el.classList.add('dragging');
                el.style.left = initL + 'px';
                el.style.top = initT + 'px';
            });

            el.addEventListener('touchmove', (e) => {
                if (!el.classList.contains('dragging')) return;
                const t = e.touches[0];
                el.style.left = (initL + (t.clientX - startX)) + 'px';
                el.style.top = (initT + (t.clientY - startY)) + 'px';
            });

            el.addEventListener('touchend', () => {
                el.classList.remove('dragging');
                const bag = document.getElementById('school-bag-img').getBoundingClientRect();
                const item = el.getBoundingClientRect();

                const isOver = !(item.right < bag.left || item.left > bag.right || 
                                 item.bottom < bag.top || item.top > bag.bottom);

                if (isOver && el.id === currentTarget.id) {
                    playSound('correct.mp3');
                    trials++;
                    resetPos(el);
                    setTimeout(nextTrial, 1200);
                } else {
                    if (isOver) playSound('incorrect.mp3');
                    resetPos(el);
                }
            });
        }

        function resetPos(el) {
            el.classList.add('returning');
            el.style.left = "auto"; 
            el.style.top = "auto";
            el.style.position = "relative";
            setTimeout(() => {
                el.classList.remove('returning');
                el.style.position = "";
            }, 400);
        }
    </script>
</body>
</html>
