<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>上學小幫手</title>
    <style>
        :root { --bg: #f0fcfd; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: sans-serif; position: fixed; }

        /* Pages */
        #welcome, #win { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 100; }
        #game-ui { display: none; width: 100vw; height: 100vh; position: relative; z-index: 5; }

        /* Score */
        #score-bar { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 24px; font-weight: bold; color: #00796b; }

        /* School Bag (The Target) */
        #bag-container { 
            position: absolute; left: 5%; top: 15%; width: 40%; height: 75%; 
            display: flex; align-items: center; justify-content: center;
            z-index: 1; /* Lower than items */
        }
        #bag-img { width: 95%; height: 95%; object-fit: contain; }

        /* Items Grid */
        #grid { 
            position: absolute; right: 5%; top: 15%; width: 50%; height: 75%; 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            z-index: 10; 
        }
        .slot { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

        /* Draggable Item */
        .item { 
            width: 100px; height: 130px; background: #fff; border-radius: 12px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; touch-action: none;
        }
        .item img { width: 75px; height: 75px; object-fit: contain; pointer-events: none; }
        .item span { font-size: 14px; font-weight: bold; margin-top: 5px; pointer-events: none; }

        .dragging { position: fixed !important; z-index: 1000 !important; pointer-events: none; }
        .returning { transition: transform 0.3s ease-out, left 0.3s ease-out, top 0.3s ease-out; }

        .btn { padding: 20px 60px; font-size: 28px; background: #4caf50; color: #fff; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="welcome">
        <h1>🎒 上學小幫手</h1>
        <button class="btn" onclick="start()">開始遊戲</button>
    </div>

    <div id="game-ui">
        <div id="score-bar">進度: <span id="count">1</span> / 10</div>
        <div id="bag-container">
            <img id="bag-img" src="assets/images/school_bag.png">
        </div>
        <div id="grid"></div>
    </div>

    <div id="win" style="display:none;">
        <h1>🎉 完成了！</h1>
        <button class="btn" onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        const config = [
            { id: 'bag', n: '功課袋', f: 'homework_bag.jpg' },
            { id: 'pens', n: '顏色筆', f: 'colored_pencils.png' },
            { id: 'scissors', n: '較剪', f: 'scissors.png' },
            { id: 'handbook', n: '手冊', f: 'handbook.jpg' },
            { id: 'eraser', n: '擦膠', f: 'eraser.png' },
            { id: 'pencil', n: '鉛筆', f: 'pencil.png' }
        ];

        let score = 0;
        let targetId = "";
        let busy = false;

        function play(f) { new Audio(`assets/audio/${f}`).play().catch(()=>{}); }

        function start() {
            play('correct.mp3');
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            
            const grid = document.getElementById('grid');
            config.forEach(item => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                const el = document.createElement('div');
                el.className = 'item';
                el.id = item.id;
                el.innerHTML = `<img src="assets/images/${item.f}"><span>${item.n}</span>`;
                
                addDrag(el, slot);
                slot.appendChild(el);
                grid.appendChild(slot);
            });
            next();
        }

        function next() {
            if (score >= 10) {
                document.getElementById('game-ui').style.display = 'none';
                document.getElementById('win').style.display = 'flex';
                play('congrats_fanfare.mp3');
                return;
            }
            busy = false;
            targetId = config[Math.floor(Math.random() * config.length)].id;
            document.getElementById('count').innerText = score + 1;
            play(`voice_${targetId}.mp3`);
        }

        function addDrag(el, slot) {
            let startX, startY;

            el.ontouchstart = (e) => {
                if (busy) return;
                const t = e.touches[0];
                const r = el.getBoundingClientRect();
                startX = t.clientX - r.left;
                startY = t.clientY - r.top;
                
                el.style.width = r.width + 'px';
                el.style.height = r.height + 'px';
                el.style.left = r.left + 'px';
                el.style.top = r.top + 'px';
                el.classList.add('dragging');

                const move = (me) => {
                    const mt = me.touches[0];
                    el.style.left = (mt.clientX - startX) + 'px';
                    el.style.top = (mt.clientY - startY) + 'px';
                };

                const end = (ee) => {
                    el.classList.remove('dragging');
                    const bag = document.getElementById('bag-img').getBoundingClientRect();
                    const item = el.getBoundingClientRect();

                    // Simple overlap check (Standard early-version logic)
                    const hit = !(item.right < bag.left || item.left > bag.right || 
                                 item.bottom < bag.top || item.top > bag.bottom);

                    if (hit && el.id === targetId) {
                        busy = true;
                        score++;
                        play('correct.mp3');
                        resetPosition(el, slot);
                        setTimeout(next, 1200);
                    } else {
                        if (hit) play('incorrect.mp3');
                        resetPosition(el, slot);
                    }
                    window.removeEventListener('touchmove', move);
                    window.removeEventListener('touchend', end);
                };

                window.addEventListener('touchmove', move, { passive: false });
                window.addEventListener('touchend', end);
            };
        }

        function resetPosition(el, slot) {
            el.classList.add('returning');
            const r = slot.getBoundingClientRect();
            el.style.left = r.left + 'px';
            el.style.top = r.top + 'px';
            setTimeout(() => {
                el.classList.remove('returning');
                el.style.position = 'relative';
                el.style.left = '0';
                el.style.top = '0';
                slot.appendChild(el);
            }, 300);
        }
    </script>
</body>
</html>
