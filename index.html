<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上學小幫手</title>
    <style>
        :root { --bg: #e0f7fa; --btn: #ff6b6b; }
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            overflow: hidden; font-family: sans-serif; background: var(--bg); 
            touch-action: none; /* Prevents pull-to-refresh and scrolling */
        }
        #orientation-overlay { 
            position: fixed; inset: 0; background: #333; color: white; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 9999; text-align: center; 
        }
        @media screen and (orientation: landscape) { #orientation-overlay { display: none; } }
        
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        
        button { padding: 15px 40px; font-size: 28px; cursor: pointer; background: var(--btn); color: white; border: none; border-radius: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        #game-layout { display: flex; width: 100%; height: 100%; align-items: center; justify-content: space-around; padding: 20px; box-sizing: border-box; }
        #drop-zone { flex: 1; display: flex; justify-content: center; align-items: center; }
        #school-bag { width: 90%; max-width: 350px; pointer-events: none; transition: transform 0.2s; }
        
        #items-grid { 
            flex: 1; display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(2, 1fr); 
            gap: 20px; width: 50%; height: 70%; 
        }
        .item-container { display: flex; justify-content: center; align-items: center; position: relative; }
        
        .draggable-item { 
            width: 120px; height: 120px; object-fit: contain; 
            z-index: 10; cursor: grab; touch-action: none; 
            user-select: none; -webkit-user-drag: none;
        }
        .dragging { opacity: 0.8; transform: scale(1.2) !important; z-index: 100; cursor: grabbing; }
        #progress { position: absolute; top: 15px; font-size: 24px; font-weight: bold; color: #00796b; background: rgba(255,255,255,0.5); padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>

    <div id="orientation-overlay"><h2>請將螢幕橫置以進行遊戲</h2></div>

    <div id="welcome-screen" class="screen">
        <h1 style="color: #00796b; font-size: 48px;">中文詞彙練習</h1>
        <button id="btn-start">開始遊戲</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="progress">第 <span id="current-count">1</span> / 10 題</div>
        <div id="game-layout">
            <div id="drop-zone">
                <img id="school-bag" src="assets/images/school_bag.png" alt="書包">
            </div>
            <div id="items-grid"></div>
        </div>
    </div>

    <div id="congrats-screen" class="screen hidden">
        <h1 style="font-size: 60px; color: #ff6b6b;">太棒了！</h1>
        <button onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        const items = [
            { id: 'bag', img: 'homework_bag.jpg', voice: 'voice_bag.mp3' },
            { id: 'pencils', img: 'colored_pencils.png', voice: 'voice_pens.mp3' },
            { id: 'scissors', img: 'scissors.png', voice: 'voice_scissors.mp3' },
            { id: 'handbook', img: 'handbook.jpg', voice: 'voice_handbook.mp3' },
            { id: 'eraser', img: 'eraser.png', voice: 'voice_eraser.mp3' },
            { id: 'pencil', img: 'pencil.png', voice: 'voice_pencil.mp3' }
        ];

        let trials = [];
        let currentTrialIndex = 0;
        let currentTarget = null;
        let isWaiting = false;
        let currentAudio = null;

        const sndCorrect = new Audio('assets/audio/correct.mp3');
        const sndIncorrect = new Audio('assets/audio/incorrect.mp3');
        const sndFanfare = new Audio('assets/audio/congrats_fanfare.mp3');

        function stopAllAudio() {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            sndCorrect.pause(); sndCorrect.currentTime = 0;
            sndIncorrect.pause(); sndIncorrect.currentTime = 0;
        }

        function playVoice(fileName) {
            stopAllAudio();
            currentAudio = new Audio(`assets/audio/${fileName}`);
            currentAudio.play().catch(e => console.log("Audio play blocked"));
        }

        function setupGame() {
            let shuffled = [...items].sort(() => Math.random() - 0.5);
            trials = [...shuffled];
            while (trials.length < 10) {
                let last = trials[trials.length - 1];
                let options = items.filter(i => i.id !== last.id);
                trials.push(options[Math.floor(Math.random() * options.length)]);
            }
        }

        function startTrial() {
            if (currentTrialIndex >= 10) {
                showScreen('congrats-screen');
                sndFanfare.play();
                return;
            }
            isWaiting = false;
            currentTarget = trials[currentTrialIndex];
            document.getElementById('current-count').innerText = currentTrialIndex + 1;
            renderGrid();
            setTimeout(() => { playVoice(currentTarget.voice); }, 500);
        }

        function renderGrid() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = '';
            [...items].sort(() => Math.random() - 0.5).forEach(item => {
                const container = document.createElement('div');
                container.className = 'item-container';
                const img = document.createElement('img');
                img.src = `assets/images/${item.img}`;
                img.className = 'draggable-item';
                img.dataset.id = item.id;
                initDrag(img);
                container.appendChild(img);
                grid.appendChild(container);
            });
        }

        function initDrag(el) {
            let startX, startY;
            
            const onStart = (e) => {
                if(isWaiting) return;
                const pos = e.type.includes('touch') ? e.touches[0] : e;
                startX = pos.clientX;
                startY = pos.clientY;
                
                el.classList.add('dragging');
                if (currentAudio) currentAudio.pause();

                window.addEventListener('mousemove', onMove, { passive: false });
                window.addEventListener('touchmove', onMove, { passive: false });
                window.addEventListener('mouseup', onEnd);
                window.addEventListener('touchend', onEnd);
            };

            const onMove = (e) => {
                if (!el.classList.contains('dragging')) return;
                if (e.cancelable) e.preventDefault();
                
                const pos = e.type.includes('touch') ? e.touches[0] : e;
                const dx = pos.clientX - startX;
                const dy = pos.clientY - startY;
                
                el.style.transform = `translate(${dx}px, ${dy}px)`;
            };

            const onEnd = () => {
                if (!el.classList.contains('dragging')) return;
                el.classList.remove('dragging');
                
                const bagRect = document.getElementById('school-bag').getBoundingClientRect();
                const itemRect = el.getBoundingClientRect();

                // Calculate center point of the dragged item
                const itemCenterX = itemRect.left + itemRect.width / 2;
                const itemCenterY = itemRect.top + itemRect.height / 2;

                // Check if center is within bag boundaries
                const hit = (
                    itemCenterX > bagRect.left &&
                    itemCenterX < bagRect.right &&
                    itemCenterY > bagRect.top &&
                    itemCenterY < bagRect.bottom
                );

                if (hit && el.dataset.id === currentTarget.id) {
                    isWaiting = true;
                    el.style.transition = 'opacity 0.3s, transform 0.3s';
                    el.style.opacity = '0';
                    el.style.transform = `translate(${itemRect.left - startX}px, ${itemRect.top - startY}px) scale(0.5)`;
                    
                    sndCorrect.play();
                    currentTrialIndex++;
                    setTimeout(startTrial, 1500);
                } else {
                    if (hit) sndIncorrect.play();
                    el.style.transform = 'translate(0, 0)';
                }

                // Cleanup listeners
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('touchmove', onMove);
                window.removeEventListener('mouseup', onEnd);
                window.removeEventListener('touchend', onEnd);
            };

            el.addEventListener('mousedown', onStart);
            el.addEventListener('touchstart', onStart, { passive: false });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            // Unlock audio for iOS/Chrome
            [sndCorrect, sndIncorrect, sndFanfare].forEach(s => {
                s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {});
            });
            setupGame();
            showScreen('game-screen');
            startTrial();
        });
    </script>
</body>
</html>
