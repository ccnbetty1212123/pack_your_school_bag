<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上學小幫手 - School Bag Game</title>
    <style>
        :root {
            --bg-color: #e0f7fa;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            touch-action: none; /* Prevents scrolling/zooming on mobile */
        }

        #orientation-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #333; color: white; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; visibility: hidden;
        }

        /* Show overlay if portrait */
        @media screen and (orientation: portrait) {
            #orientation-overlay { visibility: visible; }
        }

        #welcome-page, #congrats-page {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; background: var(--bg-color); z-index: 50;
        }

        .btn-start {
            padding: 20px 40px; font-size: 24px; cursor: pointer;
            background: #4caf50; color: white; border: none; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #game-container {
            display: none; width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
            background: url('assets/images/classroom_bg.jpg') center/cover; /* Optional background */
        }

        #school-bag {
            position: absolute; left: 5%; top: 20%;
            width: 35%; height: 65%;
            background: url('assets/images/school_bag.png') no-repeat center/contain;
            display: flex; align-items: center; justify-content: center;
        }

        .item {
            position: absolute; width: 100px; height: 100px;
            cursor: grab; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10;
        }

        .item img {
            width: 100%; height: 80%; object-fit: contain;
            pointer-events: none; /* Allows touch to pass to parent div */
        }

        .item span {
            font-size: 14px; font-weight: bold; background: white; 
            padding: 2px 5px; border-radius: 5px;
        }

        .item.dragging { opacity: 0.7; transform: scale(1.2); z-index: 100; }
        .item.returning { transition: all 0.5s ease-out; }

        #ui-bar {
            position: absolute; top: 10px; width: 100%;
            text-align: center; font-size: 24px; font-weight: bold;
            color: #004d40; text-shadow: 1px 1px white;
        }
    </style>
</head>
<body>

    <div id="orientation-overlay"><h1>請將手機/iPad橫轉<br>Please Rotate to Landscape</h1></div>

    <div id="welcome-page">
        <h1>🎒 上學小幫手</h1>
        <p>聽指令，把正確的物品放進書包裡！</p>
        <button class="btn-start" onclick="startGame()">開始遊戲 START</button>
    </div>

    <div id="game-container">
        <div id="ui-bar">進度: <span id="trial-count">0</span> / 10</div>
        <div id="school-bag"></div>
        <div id="items-area"></div>
    </div>

    <div id="congrats-page" style="display:none;">
        <h1>🎉 太棒了！你好叻呀！</h1>
        <button class="btn-start" onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        const words = [
            { id: 'bag', text: '功課袋', file: 'homework_bag.jpg' },
            { id: 'pens', text: '顏色筆', file: 'colored_pencils.png' },
            { id: 'scissors', text: '較剪', file: 'scissors.png' },
            { id: 'handbook', text: '手冊', file: 'handbook.jpg' },
            { id: 'eraser', text: '擦膠', file: 'eraser.png' },
            { id: 'pencil', text: '鉛筆', file: 'pencil.png' }
        ];

        let trials = 0;
        let currentTarget = null;
        let lastTarget = null;
        let history = [];

        function playSound(filename) {
            const audio = new Audio(`assets/audio/${filename}`);
            audio.play().catch(e => console.log("Audio play blocked or missing"));
        }

        function startGame() {
            document.getElementById('welcome-page').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            initItems();
            setTimeout(nextTrial, 500);
        }

        function initItems() {
            const area = document.getElementById('items-area');
            words.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.id = item.id;
                
                // Randomize initial positions on the right side
                const top = (10 + (index * 14)) + "%";
                const left = (55 + (Math.random() * 25)) + "%";
                div.style.top = top;
                div.style.left = left;
                div.dataset.origTop = top;
                div.dataset.origLeft = left;

                div.innerHTML = `
                    <img src="assets/images/${item.file}" alt="${item.text}">
                    <span>${item.text}</span>
                `;
                
                setupDraggable(div);
                area.appendChild(div);
            });
        }

        function nextTrial() {
            if (trials >= 10) {
                showCongrats();
                return;
            }

            let available = words.filter(w => w.id !== (lastTarget ? lastTarget.id : null));
            
            // Ensure all items used at least once in first 6 trials
            if (trials < 6) {
                available = available.filter(w => !history.includes(w.id));
            }

            currentTarget = available[Math.floor(Math.random() * available.length)];
            lastTarget = currentTarget;
            history.push(currentTarget.id);
            
            // Play voice instruction (e.g., voice_pencil.mp3)
            playSound(`voice_${currentTarget.id}.mp3`);
            document.getElementById('trial-count').innerText = trials + 1;
        }

        function setupDraggable(el) {
            let startX, startY, initialLeft, initialTop;
            
            el.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                el.classList.add('dragging');
                startX = touch.clientX;
                startY = touch.clientY;
                initialLeft = el.offsetLeft;
                initialTop = el.offsetTop;
            });

            el.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                const dx = touch.clientX - startX;
                const dy = touch.clientY - startY;
                el.style.left = (initialLeft + dx) + 'px';
                el.style.top = (initialTop + dy) + 'px';
            });

            el.addEventListener('touchend', (e) => {
                el.classList.remove('dragging');
                checkDrop(el);
            });
        }

        function checkDrop(el) {
            const bag = document.getElementById('school-bag').getBoundingClientRect();
            const item = el.getBoundingClientRect();

            // Collision detection
            const isOverlapping = !(item.right < bag.left || item.left > bag.right || 
                                     item.bottom < bag.top || item.top > bag.bottom);

            if (isOverlapping && el.id === currentTarget.id) {
                playSound('correct.mp3');
                trials++;
                resetItem(el);
                setTimeout(nextTrial, 1200);
            } else if (isOverlapping && el.id !== currentTarget.id) {
                playSound('incorrect.mp3');
                resetItem(el);
            } else {
                resetItem(el);
            }
        }

        function resetItem(el) {
            el.classList.add('returning');
            el.style.top = el.dataset.origTop;
            el.style.left = el.dataset.origLeft;
            setTimeout(() => el.classList.remove('returning'), 500);
        }

        function showCongrats() {
            playSound('congrats_fanfare.mp3');
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('congrats-page').style.display = 'flex';
        }
    </script>
</body>
</html>
